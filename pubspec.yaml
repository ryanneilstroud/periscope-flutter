name: periscope_flutter
description: Flutter bridge for PeriscopeKit (iOS) and PeriscopeAndroid (Android).
version: 0.1.0
homepage: https://github.com/ryanneilstroud/periscope-flutter
repository: https://github.com/ryanneilstroud/periscope-flutter

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.ryanneilstroud.periscope_flutter
        pluginClass: PeriscopeFlutterPlugin
      ios:
        pluginClass: PeriscopeFlutterPlugin
